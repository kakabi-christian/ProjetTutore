name: CI-CD ExchaPay

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # --- PARTIE 1 : CI (INTEGRATION CONTINUE) ---
  laravel-tests:
    name: "Qualité & Tests"
    runs-on: ubuntu-latest
    env: # AJOUTE CECI
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_test
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      # ÉTAPE DE DIAGNOSTIC : Pour vérifier la présence du dossier Backend
      - name: Vérifier la structure des dossiers
        run: ls -R

      - name: Installation de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Aligné sur ton Dockerfile
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql

      - name: Installation des dépendances (Composer)
        # On spécifie le dossier Backend car c'est là que se trouve composer.json
        working-directory: ./Backend 
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Vérification du Clean Code (Pint)
        working-directory: ./Backend
        run: ./vendor/bin/pint --test || echo "Problèmes de style détectés"

      - name: Préparation de l'environnement
        working-directory: ./Backend
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          chmod -R 777 storage bootstrap/cache

      - name: Exécution des Tests (MySQL)
        working-directory: ./Backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: ''
        run: php artisan test

      - name: Archivage de l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: exchapay-build
          path: .

  # --- PARTIE 2 : CD (DEPLOIEMENT CONTINU) ---
  build-and-push-docker:
    name: "Build & Push Docker"
    needs: laravel-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Récupération de l'artefact
        uses: actions/download-artifact@v4
        with:
          name: exchapay-build

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construction et envoi de l'image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend # On pointe vers le dossier du code source
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/exchapay-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/exchapay-backend:${{ github.sha }}