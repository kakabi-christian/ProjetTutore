name: CI-CD ExchaPay (o2switch Pro)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # --- PARTIE 1 : TESTS & QUALITÉ (BACKEND) ---
  laravel-ci:
    name: "Backend CI (Tests & Pint)"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_test
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: "📦 Récupération du code"
        uses: actions/checkout@v4

      - name: "⚙️ Installation PHP 8.4"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath
          coverage: none

      - name: "📥 Installation Dépendances (Composer)"
        working-directory: ./Backend
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: "✨ Vérification du Style (Pint)"
        working-directory: ./Backend
        run: ./vendor/bin/pint --test
        continue-on-error: true

      - name: "🧪 Exécution des Tests"
        working-directory: ./Backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          LOG_CHANNEL: null
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan test

  # --- PARTIE 2 : BUILD FRONTEND (REACT) ---
  frontend-build:
    name: "Frontend Build (Vite)"
    needs: laravel-ci
    runs-on: ubuntu-latest
    steps:
      - name: "📦 Récupération du code"
        uses: actions/checkout@v4

      - name: "⚙️ Installation Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./Frontend/package-lock.json

      - name: "📥 Installation & Build"
        working-directory: ./Frontend
        run: |
          npm install
          npm run build

      - name: "📤 Sauvegarde du Build"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist/

  # --- PARTIE 3 : DÉPLOIEMENT SSH (o2switch) ---
  deploy-o2switch:
    name: "🚀 Déploiement o2switch"
    needs: frontend-build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.base_ref == 'main' || github.base_ref == 'develop')
    
    steps:
      - name: "📦 Récupération du code source"
        uses: actions/checkout@v4

      - name: "📥 Récupération du Build Frontend"
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist-frontend

      - name: "🚀 Envoi du Backend (rsync)"
        uses: Burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete --exclude='.env' --exclude='/storage/*.key' --exclude='/vendor'
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}
          remote_port: 5022
          path: ./Backend/
          remote_path: /home/${{ secrets.SSH_USER }}/public_html/talla/projetExchapay/Backend_Code/

      - name: "🚀 Envoi du Frontend (rsync)"
        uses: Burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}
          remote_port: 5022
          path: ./dist-frontend/
          remote_path: /home/${{ secrets.SSH_USER }}/public_html/talla/projetExchapay/Frontend_Public/

      - name: "✅ Finalisation du déploiement"
        run: echo "Le code a été déployé avec succès sur talla.cdwfs.net"