name: CI-CD ExchaPay

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # --- PARTIE 1 : CI (INTEGRATION CONTINUE) ---
  laravel-tests:
    name: "Qualité & Tests"
    runs-on: ubuntu-latest
    env: # AJOUTE CECI
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_test
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # Mis à jour pour correspondre à tes dépendances Symfony 8.0
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath
          coverage: none

      - name: Installation des dépendances (Composer)
        working-directory: ./Backend 
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Vérification du Clean Code (Pint)
        working-directory: ./Backend
        # On utilise continue-on-error pour ne pas bloquer si c'est juste un espace en trop
        run: ./vendor/bin/pint --test
        continue-on-error: true 

      - name: Préparation de l'environnement
        working-directory: ./Backend
        run: |
          cp .env.example .env
          php artisan key:generate
          # Création d'une base SQLite temporaire si besoin ou utilisation du service MySQL
          touch database/testing.sqlite 

      - name: Exécution des Tests
        working-directory: ./Backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
        run: php artisan test

  # --- PARTIE 2 : CD (BUILD DOCKER) ---
  build-and-push-docker:
    name: "Build & Push Docker Hub"
    needs: laravel-tests
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.base_ref == 'main' || github.base_ref == 'develop')
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construction et envoi de l'image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile # Assure-toi que le chemin vers le Dockerfile est correct
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/exchapay-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/exchapay-backend:${{ github.sha }}