services:
  # 1. Base de données MySQL
  db:
    image: mysql:8.0
    container_name: ExchaPay-db
    restart: always
    environment:
      MYSQL_DATABASE: ExchaPay_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - excha_db_data:/var/lib/mysql

  # 2. Backend Laravel
  backend:
    build: 
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ExchaPay-api
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ExchaPay_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    # ✅ AJOUT : Injecter le certificat et configurer PHP dans le container
    volumes:
      - ./Backend/cacert.pem:/usr/local/etc/php/cacert.pem:ro
    command: >
      sh -c "echo 'curl.cainfo=\"/usr/local/etc/php/cacert.pem\"' >> /usr/local/etc/php/conf.d/docker-php-ext-curl.ini && 
             echo 'openssl.cafile=\"/usr/local/etc/php/cacert.pem\"' >> /usr/local/etc/php/conf.d/docker-php-ext-openssl.ini && 
             php artisan serve --host=0.0.0.0 --port=8000"

  # 3. Frontend React (Vite)
  frontend:
    build: 
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ExchaPay-ui
    ports:
      - "4200:5173" 
    depends_on:
      - backend

volumes:
  excha_db_data: