apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: exchapay-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: exchapay-backend
  minReplicas: 2   # Minimum 2 pods pour la sécurité
  maxReplicas: 5   # Peut monter jusqu'à 5 si ça chauffe
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # Si le CPU dépasse 50% en moyenne, il crée un nouveau pod