# k8s/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exchapay-backend
  labels:
    app: exchapay
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: exchapay-backend
  template:
    metadata:
      labels:
        app: exchapay-backend
    spec:
      containers:
      - name: backend
        image: kakabi88548/exchapay-backend:latest
        ports:
        - containerPort: 8000
        
        # --- INJECTION DES CONFIGURATIONS ET SECRETS ---
        envFrom:
        - configMapRef:
            name: exchapay-backend-config
        - secretRef:
            name: exchapay-backend-secrets

        # --- SANTÉ DE L'APPLICATION ---
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 45 # On laisse un peu plus de temps au démarrage
          periodSeconds: 10

        # --- LIMITES DE RESSOURCES ---
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"